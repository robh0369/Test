<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏴‍☠️ Pirate Puzzle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #1a6b8a;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      -webkit-user-select: none; user-select: none;
    }

    #app {
      display: flex; flex-direction: column;
      height: 100vh; height: 100dvh;
    }

    #header {
      flex-shrink: 0;
      text-align: center;
      color: #FFD600;
      font-size: 22px; font-weight: bold;
      padding: 8px 0 4px;
    }

    #board-wrap {
      flex-shrink: 0;
      display: flex; justify-content: center;
    }

    #board {
      display: grid;
      background: #D4A574;
      border: 4px solid #8B4513;
      border-radius: 8px;
      overflow: hidden;
    }

    .slot {
      position: relative;
      border: 1.5px dashed rgba(255,255,255,0.35);
      overflow: hidden;
    }
    .slot.filled { border: 2px solid #FFD600; }

    .slot-hint {
      position: absolute; inset: 0;
      opacity: 0.18;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .slot.filled .slot-hint { opacity: 0; }

    .slot-piece {
      position: absolute; inset: 0;
    }

    #tray {
      flex: 1;
      background: #8B4513;
      border-top: 5px solid #FFD700;
      display: flex; flex-direction: row;
      align-items: center;
      overflow-x: auto; overflow-y: hidden;
      padding: 6px 8px; gap: 6px;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    .piece {
      flex-shrink: 0;
      border: 2.5px solid #FFD700;
      border-radius: 5px;
      cursor: grab;
      touch-action: none;
    }

    #ghost {
      position: fixed;
      display: none;
      pointer-events: none;
      z-index: 9999;
      border: 2.5px solid #FFD700;
      border-radius: 5px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.55);
    }

    /* snap flash on slot */
    @keyframes snapFlash {
      0%   { background: rgba(255,214,0,0.5); transform: scale(0.92); }
      100% { background: transparent;         transform: scale(1); }
    }
    .slot.snap-anim { animation: snapFlash 0.3s ease-out; }

    /* celebration */
    #celebration {
      display: none; position: fixed; inset: 0;
      z-index: 1000;
      align-items: center; justify-content: center;
    }
    #celebration.active { display: flex; }

    #cel-card {
      background: rgba(26,107,138,0.95);
      border: 4px solid #FFD600;
      border-radius: 24px;
      padding: 28px 36px;
      text-align: center;
      animation: popIn .5s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    #cel-title { font-size: 32px; font-weight: bold; color: #FFD600; margin-bottom: 8px; }
    #cel-sub   { font-size: 18px; color: white; margin-bottom: 22px; }
    #restart   {
      background: #FFD600; color: #111;
      font-size: 19px; font-weight: bold;
      border: none; border-radius: 50px;
      padding: 12px 28px; cursor: pointer;
    }

    .confetti-p {
      position: fixed; pointer-events: none; z-index: 998;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="header">🏴‍☠️ Pirate Puzzle!</div>
  <div id="board-wrap"><div id="board"></div></div>
  <div id="tray"></div>
</div>

<div id="ghost"></div>

<div id="celebration">
  <div id="cel-card">
    <div id="cel-title">🏴‍☠️ YOU DID IT! 🏴‍☠️</div>
    <div id="cel-sub">Ahoy, brave pirate!</div>
    <button id="restart" onclick="startGame()">Play Again! ⚓</button>
  </div>
</div>

<script>

// ── SVG Ship ──────────────────────────────────────────────────────────────────

function sunRays() {

    const y1 = (58  + Math.sin(a) * 44).toFixed(1);
    const x2 = (355 + Math.cos(a) * 60).toFixed(1);
    const y2 = (58  + Math.sin(a) * 60).toFixed(1);
    s += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#FFD600" stroke-width="5" stroke-linecap="round"/>`;
  }
  return s;
}

function getShipUrl() {
  if (!shipUrl) {
    const blob = new Blob([buildShipSVG()], { type: 'image/svg+xml' });
    shipUrl = URL.createObjectURL(blob);
  }
  return shipUrl;
}

// ── Layout helpers ────────────────────────────────────────────────────────────

function calcS() {
  const vw = window.innerWidth;
  const vh = window.innerHeight || window.screen.height;
  const headerH = document.getElementById('header').getBoundingClientRect().height || 46;
  const trayExtras = 21; // border + padding
  const availH = vh - headerH - trayExtras;
  // ROWS rows for board + 1 row for tray
  return Math.floor(Math.min(vw / COLS, availH / (ROWS + 1)));
}

function setPieceBg(el, col, row) {
  el.style.backgroundImage    = `url("${getShipUrl()}")`;
  el.style.backgroundSize     = `${S * COLS}px ${S * ROWS}px`;
  el.style.backgroundRepeat   = 'no-repeat';
  el.style.backgroundPosition = `-${col * S}px -${row * S}px`;
  el.style.width  = S + 'px';
  el.style.height = S + 'px';
}

// ── Game ──────────────────────────────────────────────────────────────────────

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  S = calcS();
  placed.clear();
  dragData = null;
  ghost.style.display = 'none';
  celEl.classList.remove('active');
  document.querySelectorAll('.confetti-p').forEach(p => p.remove());

  // Board
  boardEl.innerHTML = '';
  boardEl.style.width  = (S * COLS) + 'px';
  boardEl.style.height = (S * ROWS) + 'px';
  boardEl.style.gridTemplateColumns = `repeat(${COLS}, ${S}px)`;
  boardEl.style.gridTemplateRows    = `repeat(${ROWS}, ${S}px)`;

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.dataset.col = col;
      slot.dataset.row = row;
      slot.style.width = slot.style.height = S + 'px';

      // Faint hint so child can see where each piece belongs
      const hint = document.createElement('div');
      hint.className = 'slot-hint';
      setPieceBg(hint, col, row);
      slot.appendChild(hint);

      boardEl.appendChild(slot);
    }
  }

  // Tray pieces (shuffled)
  trayEl.innerHTML = '';
  const pieces = [];
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      pieces.push({ col, row, id: `${row}_${col}` });
    }
  }
  shuffle(pieces);

  pieces.forEach(p => {
    const el = document.createElement('div');
    el.className = 'piece';
    el.dataset.id  = p.id;
    el.dataset.col = p.col;
    el.dataset.row = p.row;
    setPieceBg(el, p.col, p.row);
    el.addEventListener('pointerdown', onPointerDown);
    trayEl.appendChild(el);
  });
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────

function onPointerDown(e) {
  e.preventDefault();
  const piece = e.currentTarget;
  const rect  = piece.getBoundingClientRect();
  const col   = +piece.dataset.col;
  const row   = +piece.dataset.row;
  const offX  = e.clientX - rect.left;
  const offY  = e.clientY - rect.top;

  ghost.style.width  = S + 'px';
  ghost.style.height = S + 'px';
  ghost.style.left   = rect.left + 'px';
  ghost.style.top    = rect.top  + 'px';
  setPieceBg(ghost, col, row);
  ghost.style.display = 'block';

  piece.style.opacity = '0.2';
  dragData = { piece, col, row, offX, offY };

  piece.setPointerCapture(e.pointerId);
  piece.addEventListener('pointermove',   onPointerMove);
  piece.addEventListener('pointerup',     onPointerUp);
  piece.addEventListener('pointercancel', onPointerCancel);
}

function onPointerMove(e) {
  e.preventDefault();
  if (!dragData) return;
  ghost.style.left = (e.clientX - dragData.offX) + 'px';
  ghost.style.top  = (e.clientY - dragData.offY) + 'px';
}

function onPointerUp(e) {
  if (!dragData) return;
  e.preventDefault();

  const { piece, col, row, offX, offY } = dragData;
  const dropCX = e.clientX - offX + S / 2;
  const dropCY = e.clientY - offY + S / 2;

  const targetSlot = boardEl.querySelector(`.slot[data-col="${col}"][data-row="${row}"]`);
  let snapped = false;

  if (targetSlot && !placed.has(piece.dataset.id)) {
    const sr     = targetSlot.getBoundingClientRect();
    const slotCX = sr.left + sr.width  / 2;
    const slotCY = sr.top  + sr.height / 2;

    if (Math.hypot(dropCX - slotCX, dropCY - slotCY) <= SNAP) {
      snapped = true;

      // Place filled image in slot
      const img = document.createElement('div');
      img.className = 'slot-piece';
      setPieceBg(img, col, row);
      targetSlot.appendChild(img);
      targetSlot.classList.add('filled');

      // Snap flash
      targetSlot.classList.remove('snap-anim');
      void targetSlot.offsetWidth; // reflow to restart animation
      targetSlot.classList.add('snap-anim');

      piece.remove();
      placed.add(piece.dataset.id);
    }
  }

  if (!snapped) piece.style.opacity = '1';

  ghost.style.display = 'none';
  endDrag(e);

  if (placed.size === COLS * ROWS) setTimeout(showCelebration, 450);
}

function onPointerCancel(e) {
  if (!dragData) return;
  dragData.piece.style.opacity = '1';
  ghost.style.display = 'none';
  endDrag(e);
}

function endDrag(e) {
  if (!dragData) return;
  const p = dragData.piece;
  dragData = null;
  p.removeEventListener('pointermove',   onPointerMove);
  p.removeEventListener('pointerup',     onPointerUp);
  p.removeEventListener('pointercancel', onPointerCancel);
}

// ── Celebration ───────────────────────────────────────────────────────────────

const COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6BFF','#FF9500','#00C9FF'];

function showCelebration() {
  celEl.classList.add('active');

  for (let i = 0; i < 30; i++) {
    const p    = document.createElement('div');
    p.className = 'confetti-p';
    const w    = Math.random() > 0.5 ? 8 : 12;
    const h    = w === 8 ? 16 : 12;
    const dur  = 2200 + Math.random() * 1200;
    const delay = Math.random() * 900;
    const endR = 360 + Math.floor(Math.random() * 360);

    p.style.cssText = `
      left:${(Math.random()*100).toFixed(1)}vw; top:0;
      width:${w}px; height:${h}px;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
    `;
    document.body.appendChild(p);

    p.animate([
      { transform: 'translateY(-60px) rotate(0deg)',        opacity: 1 },
      { transform: `translateY(110vh) rotate(${endR}deg)`, opacity: 0 }
    ], { duration: dur, delay, fill: 'forwards', easing: 'linear' });
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', startGame);
window.addEventListener('resize', () => { if (!dragData) startGame(); });
</script>
</body>
</html>
